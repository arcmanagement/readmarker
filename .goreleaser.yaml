version: 2

project_name: readmarker

before:
  hooks:
    - go mod tidy

builds:
  - id: readmarker
    main: ./cmd/readmarker
    binary: readmarker
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: readmarker
    ids:
      - readmarker
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}

homebrew_casks:
  - name: readmarker
    ids:
      - readmarker
    binaries:
      - readmarker
    repository:
      owner: arcmanagement
      name: homebrew-readmarker
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/arcmanagement/readmarker
    description: Source-agnostic read-cursor ledger for AI agents
    url:
      verified: github.com/arcmanagement/readmarker/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/readmarker"]
          end
